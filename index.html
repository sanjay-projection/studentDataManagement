<!DOCTYPE html>
<html>
<head>
<title>Student Management System</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Student Management System</h1>

<form id="studentForm">

<input
type="text"
id="name"
placeholder="Student Name"
required>

<input
type="text"
id="department"
placeholder="Department"
required>

<input
type="email"
id="email"
placeholder="Email"
required>

<input
type="text"
id="phone"
placeholder="Phone"
required>

<button>
Save Student
</button>

</form>

<table>

<thead>

<tr>
<th>Name</th>
<th>Department</th>
<th>Email</th>
<th>Phone</th>
<th>Action</th>
</tr>

</thead>

<tbody id="studentTable">

</tbody>

</table>

</div>

<script src="script.js"></script>

</body>
</html>
